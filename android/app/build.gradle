apply plugin: 'com.android.application'

// Read version from the root package.json so bump-version.sh is the
// single source of truth for app versioning across all platforms.
def packageJson = new groovy.json.JsonSlurper().parse(file("../../package.json"))
def appVersionName = packageJson.version
def appVersionCode = appVersionName.replace('.', '').toInteger()

android {
    namespace = "io.runebase.runebaselitewallet"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "io.runebase.runebaselitewallet"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    // Release signing — reads from environment variables set by CI or a local
    // gradle.properties. Falls back to debug signing if not configured.
    //
    // Required env vars / gradle properties:
    //   KEYSTORE_PATH, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
    //
    // In GitHub Actions these come from repository secrets.
    // For local builds, create android/keystore.properties (gitignored):
    //   storeFile=../release.keystore
    //   storePassword=...
    //   keyAlias=...
    //   keyPassword=...
    def keystorePropsFile = rootProject.file("keystore.properties")
    def useKeystoreProps = keystorePropsFile.exists()
    def keystoreProps = new Properties()
    if (useKeystoreProps) {
        keystoreProps.load(new FileInputStream(keystorePropsFile))
    }

    signingConfigs {
        // Use the debug keystore from ~/.config/.android/ which matches
        // the Cordova dev builds previously deployed to test devices.
        debug {
            def configDebugKeystore = file("${System.getProperty('user.home')}/.config/.android/debug.keystore")
            if (configDebugKeystore.exists()) {
                storeFile configDebugKeystore
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
        release {
            if (useKeystoreProps) {
                storeFile file(keystoreProps['storeFile'])
                storePassword keystoreProps['storePassword']
                keyAlias keystoreProps['keyAlias']
                keyPassword keystoreProps['keyPassword']
            } else if (System.getenv("KEYSTORE_PATH")) {
                storeFile file(System.getenv("KEYSTORE_PATH"))
                storePassword System.getenv("KEYSTORE_PASSWORD")
                keyAlias System.getenv("KEY_ALIAS")
                keyPassword System.getenv("KEY_PASSWORD")
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".dev"
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            if (signingConfigs.release.storeFile != null) {
                signingConfig signingConfigs.release
            }
        }
    }

    // Include native debug symbols in the AAB so Google Play can
    // symbolicate native crash reports (resolves the "no debug symbols" warning).
    buildFeatures {
        buildConfig true
    }
    packagingOptions {
        jniLibs {
            keepDebugSymbols += ['**/*.so']
        }
    }
    ndkVersion = "27.0.12077973"
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
