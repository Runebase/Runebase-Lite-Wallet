name: Build All Platforms

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Build Vite bundle (shared by all platform jobs)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build with Vite
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-dist
          path: dist/

  # Chrome extension zip
  build-chrome:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vite-dist
          path: dist/

      - name: Create Chrome extension zip
        run: |
          cd dist
          zip -r ../Runebase-Chrome-Wallet.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: Runebase-Chrome-Wallet.zip

  # Electron - Linux only
  build-electron-linux:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: vite-dist
          path: dist/

      - name: Build Electron (Linux)
        run: npx electron-builder --linux -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/latest-linux.yml

  # Electron - Windows (needs Windows runner, no Wine)
  build-electron-win:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: vite-dist
          path: dist/

      - name: Build Electron (Windows)
        run: npx electron-builder --win -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml

  # Electron - macOS
  build-electron-mac:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: vite-dist
          path: dist/

      - name: Build Electron (macOS)
        run: npx electron-builder --mac -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  # Android (Capacitor)
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci --legacy-peer-deps

      - name: Build mobile web assets
        run: npm run build:mobile

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Decode signing keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore

      - name: Build release AAB
        working-directory: android
        env:
          KEYSTORE_PATH: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/mapping/release/mapping.txt

  # iOS (Capacitor) — simulator build only
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build mobile web assets
        run: npm run build:mobile

      - name: Add iOS platform and sync
        run: |
          npm install @capacitor/ios --legacy-peer-deps
          npx cap add ios
          npx cap sync ios

      - name: Build for simulator
        run: |
          cd ios/App
          ls -la *.xcworkspace *.xcodeproj 2>/dev/null || true
          if [ -d "App.xcworkspace" ]; then
            xcodebuild -workspace App.xcworkspace \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
              -derivedDataPath build \
              build
          else
            xcodebuild -project App.xcodeproj \
              -scheme App \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination 'platform=iOS Simulator,OS=latest,name=iPhone 16' \
              -derivedDataPath build \
              build
          fi

      - name: Package simulator build
        run: |
          APP_PATH=$(find ios/App/build -name "*.app" -type d | head -1)
          zip -r Runebase-Lite-Wallet-ios-simulator.zip "$APP_PATH"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Runebase-Lite-Wallet-ios-simulator.zip

  # Create GitHub Release (only on version tags)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-chrome, build-electron-linux, build-electron-win, build-electron-mac, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          VERSION=${GITHUB_REF#refs/tags/v}

          # Debug: show artifact structure
          echo "=== Artifact structure ==="
          find artifacts/ -type f | head -50

          # Chrome extension
          find artifacts/chrome-extension -name "*.zip" -exec cp {} "release/Runebase-Chrome-Wallet-v${VERSION}.zip" \;

          # Electron Linux
          find artifacts/electron-linux -name "*.AppImage" -exec cp {} "release/" \;
          find artifacts/electron-linux -name "*.deb" -exec cp {} "release/" \;

          # Electron Windows
          find artifacts/electron-win -name "*.exe" -exec cp {} "release/" \;

          # Electron macOS
          find artifacts/electron-mac -name "*.dmg" -exec cp {} "release/" \;

          # Android
          find artifacts/android-apk -name "app-debug.apk" -exec cp {} "release/Runebase-Lite-Wallet-v${VERSION}-debug.apk" \;
          find artifacts/android-apk -name "app-release.aab" -exec cp {} "release/Runebase-Lite-Wallet-v${VERSION}-release.aab" \;
          find artifacts/android-apk -name "mapping.txt" -exec cp {} "release/Runebase-Lite-Wallet-v${VERSION}-mapping.txt" \;

          # iOS simulator
          find artifacts/ios-build -name "*.zip" -exec cp {} "release/Runebase-Lite-Wallet-v${VERSION}-ios-simulator.zip" \;

          echo "=== Release files ==="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
