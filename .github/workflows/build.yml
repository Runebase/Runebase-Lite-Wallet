name: Build All Platforms

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  # Build webpack bundle (shared by all platform jobs)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build webpack bundle
        run: |
          npm run clean && mkdir dist
          ./scripts/create-empty-thunk.sh
          npx webpack --progress --config webpack.prod.config.js

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webpack-dist
          path: dist/

  # Chrome extension zip
  build-chrome:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Create Chrome extension zip
        run: |
          cd dist
          zip -r ../Runebase-Chrome-Wallet.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: Runebase-Chrome-Wallet.zip

  # Electron - Linux only
  build-electron-linux:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Build Electron (Linux)
        run: npx electron-builder --linux -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/latest-linux.yml

  # Electron - Windows (needs Windows runner, no Wine)
  build-electron-win:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Build Electron (Windows)
        run: npx electron-builder --win -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml

  # Electron - macOS
  build-electron-mac:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Build Electron (macOS)
        run: npx electron-builder --mac -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  # Cordova - Android
  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Copy dist to cordova/www
        run: |
          mkdir -p cordova/www
          cp -R dist/* cordova/www/

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Build Android
        working-directory: cordova
        run: |
          npm ci
          cordova platform add cordova-android@^15.0.0 --save
          # Fix deprecated compile() -> implementation() in QR scanner plugin gradle only
          sed -i "s/\bcompile\b/implementation/g" platforms/android/cordova-plugin-qrscanner/*.gradle
          cordova build android
          cordova build android --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            cordova/platforms/android/app/build/outputs/apk/debug/app-debug.apk
            cordova/platforms/android/app/build/outputs/bundle/release/app-release.aab

  # Cordova - iOS
  build-ios:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Copy dist to cordova/www
        run: |
          mkdir -p cordova/www
          cp -R dist/* cordova/www/

      - name: Install Cordova CLI and CocoaPods
        run: |
          npm install -g cordova
          sudo gem install cocoapods

      - name: Build iOS
        working-directory: cordova
        run: |
          npm ci
          cordova platform add cordova-ios@^7.1.1 --save
          cordova build ios || true

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: cordova/platforms/ios/build/
          if-no-files-found: warn
