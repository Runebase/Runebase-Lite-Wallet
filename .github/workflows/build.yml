name: Build All Platforms

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

jobs:
  # Build webpack bundle (shared by all platform jobs)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Build webpack bundle
        run: |
          npm run clean && mkdir dist
          ./scripts/create-empty-thunk.sh
          npx webpack --progress --config webpack.prod.config.js

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: webpack-dist
          path: dist/

  # Chrome extension zip
  build-chrome:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Create Chrome extension zip
        run: |
          cd dist
          zip -r ../Runebase-Chrome-Wallet.zip *

      - uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: Runebase-Chrome-Wallet.zip

  # Electron - Linux only
  build-electron-linux:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Build Electron (Linux)
        run: npx electron-builder --linux -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/latest-linux.yml

  # Electron - Windows (needs Windows runner, no Wine)
  build-electron-win:
    needs: build-web
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Build Electron (Windows)
        run: npx electron-builder --win -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: |
            dist-electron/*.exe
            dist-electron/latest.yml

  # Electron - macOS
  build-electron-mac:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Build Electron (macOS)
        run: npx electron-builder --mac -c electron-builder-config.js --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: |
            dist-electron/*.dmg
            dist-electron/*.zip

  # Cordova - Android
  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Copy dist to cordova/www
        run: |
          mkdir -p cordova/www
          cp -R dist/* cordova/www/

      - name: Install Cordova CLI
        run: npm install -g cordova

      - name: Build Android
        working-directory: cordova
        run: |
          npm ci
          cordova platform add cordova-android@^15.0.0 --save
          # Fix deprecated compile() -> implementation() in QR scanner plugin gradle
          sed -i "s/\bcompile\b/implementation/g" platforms/android/cordova-plugin-qrscanner/*.gradle
          # Fix android.support.v4 -> AndroidX in QR scanner plugin
          find platforms/android/app/src -name "*.java" -exec sed -i 's/android\.support\.v4\.app\.ActivityCompat/androidx.core.app.ActivityCompat/g' {} +
          cordova build android
          cordova build android --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            cordova/platforms/android/app/build/outputs/apk/debug/app-debug.apk
            cordova/platforms/android/app/build/outputs/bundle/release/app-release.aab

  # Cordova - iOS
  build-ios:
    needs: build-web
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --legacy-peer-deps

      - uses: actions/download-artifact@v4
        with:
          name: webpack-dist
          path: dist/

      - name: Copy dist to cordova/www
        run: |
          mkdir -p cordova/www
          cp -R dist/* cordova/www/

      - name: Install Cordova CLI and CocoaPods
        run: |
          npm install -g cordova
          sudo gem install cocoapods

      - name: Build iOS
        working-directory: cordova
        run: |
          npm ci
          cordova platform add cordova-ios@^7.1.1 --save
          cordova build ios --emulator

      - name: Zip iOS simulator build
        run: |
          cd cordova/platforms/ios/build/emulator/
          zip -r "$GITHUB_WORKSPACE/Runebase-Lite-Wallet-ios-simulator.zip" *.app

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Runebase-Lite-Wallet-ios-simulator.zip

  # Create GitHub Release (only on version tags)
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-chrome, build-electron-linux, build-electron-win, build-electron-mac, build-android, build-ios]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir -p release
          VERSION=${GITHUB_REF#refs/tags/v}

          # Debug: show artifact structure
          echo "=== Artifact structure ==="
          find artifacts/ -type f | head -50

          # Chrome extension
          find artifacts/chrome-extension -name "*.zip" -exec cp {} "release/Runebase-Chrome-Wallet-v${VERSION}.zip" \;

          # Electron Linux
          find artifacts/electron-linux -name "*.AppImage" -exec cp {} "release/" \;
          find artifacts/electron-linux -name "*.deb" -exec cp {} "release/" \;

          # Electron Windows
          find artifacts/electron-win -name "*.exe" -exec cp {} "release/" \;

          # Electron macOS
          find artifacts/electron-mac -name "*.dmg" -exec cp {} "release/" \;

          # Android
          find artifacts/android-apk -name "app-debug.apk" -exec cp {} "release/Runebase-Lite-Wallet-v${VERSION}-debug.apk" \;
          find artifacts/android-apk -name "app-release.aab" -exec cp {} "release/Runebase-Lite-Wallet-v${VERSION}-release.aab" \;

          # iOS simulator
          find artifacts/ios-build -name "*.zip" -exec cp {} "release/Runebase-Lite-Wallet-v${VERSION}-ios-simulator.zip" \;

          echo "=== Release files ==="
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: false
