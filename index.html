<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Runebase Lite Wallet</title>
    <link rel="stylesheet" href="/css/fonts.css">
    <link rel="stylesheet" href="/css/modal.css">
    <style>
      :root { color-scheme: light dark; }
      html, body { margin: 0; padding: 0; height: 100%; }

      /* QR scanner: make webview transparent so native camera preview shows through.
         The cordova QR plugin renders the camera behind the webview, so every
         layer must be transparent. We hide #root entirely and render the
         scanner overlay via a React portal directly on <body>. */
      html.qr-scanning,
      html.qr-scanning body {
        background: transparent !important;
        background-color: transparent !important;
        color-scheme: normal !important;
      }
      html.qr-scanning #root { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Background script runs first so the controller is ready -->
    <script type="module" src="/src/background/index.ts"></script>
    <script type="module" src="/src/popup/index.tsx"></script>
  </body>
</html>
